# =============================================================================
# Backend Server CI/CD Pipeline (Express.js + Node.js + PostgreSQL + Vector DB)
# =============================================================================
# Triggers: push to main/develop, pull requests
# Stages: Lint → Test → Security → Build → Containerize
# =============================================================================

name: Backend Server CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Prevent concurrent deployments
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api

jobs:
  # ===========================================================================
  # STAGE 1: Code Quality - Linting & Static Analysis
  # ===========================================================================
  lint:
    name: 🔍 Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      # ESLint - Code linting
      - name: 🔍 Run ESLint
        run: npm run lint
        continue-on-error: false

      # Prettier - Code formatting check
      - name: 🎨 Check Prettier formatting
        run: npm run format:check

      # TypeScript type checking (if using TypeScript)
      - name: 📝 TypeScript type check
        run: npm run type-check
        continue-on-error: true

  # ===========================================================================
  # STAGE 2: Unit Tests
  # ===========================================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      # Run unit tests with coverage (Jest/Vitest)
      - name: 🧪 Run unit tests
        run: npm run test:unit
        env:
          CI: true
          NODE_ENV: test

      # Test specific modules: Authentication, Task CRUD, Session Logs
      - name: 📊 Generate test summary
        run: |
          echo "### Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Tests for: Authentication, Task CRUD, Session Logs" >> $GITHUB_STEP_SUMMARY

      # Upload coverage
      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit-tests
          fail_ci_if_error: false

      # Upload test reports
      - name: 📤 Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-reports
          path: coverage/

  # ===========================================================================
  # STAGE 3: Integration Tests (PostgreSQL + Vector DB)
  # ===========================================================================
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      # PostgreSQL database
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: study_partner_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # pgvector for vector similarity search
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vector_user
          POSTGRES_PASSWORD: vector_password
          POSTGRES_DB: vector_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis for caching and sessions
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # MongoDB for services using Mongoose
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      # Wait for services to be ready
      - name: ⏳ Wait for databases
        run: |
          until pg_isready -h localhost -p 5432; do sleep 1; done
          until pg_isready -h localhost -p 5433; do sleep 1; done
          until (echo > /dev/tcp/localhost/27017) >/dev/null 2>&1; do sleep 1; done

      # Run database migrations
      - name: 🗃️ Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/study_partner_test

      # Run integration tests
      - name: 🔗 Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/study_partner_test
          JWT_SECRET: integration-test-secret
          JWT_REFRESH_SECRET: integration-test-refresh-secret
          # PostgreSQL configuration
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/study_partner_test
          # Vector DB configuration
          VECTOR_DB_URL: postgresql://vector_user:vector_password@localhost:5433/vector_db
          # Redis configuration
          REDIS_URL: redis://localhost:6379

      # Upload integration test reports
      - name: 📤 Upload integration test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: coverage/integration/

  # ===========================================================================
  # STAGE 4: Security Tests
  # ===========================================================================
  security-tests:
    name: 🔒 Security Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: security_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      # npm audit for dependency vulnerabilities
      - name: 🔍 Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # Security tests - Check encryption of sensitive data
      - name: 🔐 Run security tests
        run: npm run test:security
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/security_test

      # Trivy vulnerability scanner
      - name: 🛡️ Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      # Check for secrets in code
      - name: 🔍 Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      # Upload security reports
      - name: 📤 Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: security-reports/

  # ===========================================================================
  # STAGE 5: Build Application
  # ===========================================================================
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      # Get version from package.json
      - name: 🔖 Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Build TypeScript (if applicable)
      - name: 🏗️ Build application
        run: npm run build

      # Prune dev dependencies for production
      - name: 🧹 Prune dev dependencies
        run: npm prune --production

      # Upload build artifacts
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-${{ steps.version.outputs.version }}
          path: |
            dist/
            package.json
            package-lock.json
          retention-days: 7

  # ===========================================================================
  # STAGE 6: Docker Containerization
  # ===========================================================================
  containerize:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Set up QEMU for multi-platform builds
      - name: 🔧 Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: 🔐 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image metadata
      - name: 📋 Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}},value=${{ needs.build.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}

      # Build and push Docker image
      - name: 🐳 Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
